<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV 데이터 업로드 - 교회 관리 시스템</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        .form-group { margin-bottom: 20px; }
        .result { margin-top: 20px; padding: 15px; border-radius: 4px; display: none; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        pre { background: #f4f4f4; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>교인 정보 CSV 업로드</h1>
    <p>CSV 파일 형식: name, category, birth_year, bs, district, salvation_date, phone, address, family_relation 헤더 포함</p>
    
    <form id="uploadForm">
        <div class="form-group">
            <input type="file" id="csvFile" name="csvFile" accept=".csv" required>
        </div>
        <button type="submit">업로드</button>
    </form>

    <div id="result" class="result"></div>

    <script>
        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('csvFile');
            const resultDiv = document.getElementById('result');
            
            if (!fileInput.files[0]) return;

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            try {
                resultDiv.style.display = 'block';
                resultDiv.className = 'result';
                resultDiv.textContent = '업로드 중...';

                const response = await fetch('/api/upload-members', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.textContent = `성공: ${data.count}개의 행이 삽입되었습니다.`;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = `오류: ${data.error || '알 수 없는 오류'}`;
                }
            } catch (err) {
                resultDiv.className = 'result error';
                resultDiv.textContent = `네트워크 오류: ${err.message}`;
            }
        };
    </script>
</body>
</html>
