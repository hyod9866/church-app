<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>심방 현황 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="bg-gradient-to-r from-blue-700 via-blue-800 to-indigo-900 text-white p-3 md:p-4 shadow-md flex justify-between items-center flex-shrink-0 sticky top-0 z-50">
        <a href="/" class="hover:opacity-80 transition-opacity duration-150">
            <h1 class="text-base md:text-xl font-black truncate mr-2">
                <span class="md:hidden">P.M.P</span>
                <span class="hidden md:flex flex-col text-left leading-none">
                    <span class="text-sm md:text-base font-black tracking-wider">Pastoral Ministry</span>
                    <span class="text-[10px] text-blue-200/90 font-bold mt-0.5">Program</span>
                </span>
            </h1>
        </a>
        <div class="flex gap-2 overflow-x-auto no-scrollbar">
            <a href="/status.html" class="bg-white/10 hover:bg-white/20 text-white border border-white/20 px-3 py-1.5 rounded-lg font-medium transition text-xs md:text-sm whitespace-nowrap flex items-center gap-1.5">
                <svg class="w-4 h-4 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v16m-6 0a2 2 0 002 2h2a2 2 0 002-2"></path></svg>
                교회/교구/구역 현황
            </a>
            <!-- 성도 현황 -->
            <a href="/member_management.html" class="bg-white/10 hover:bg-white/20 text-white border border-white/20 px-3 py-1.5 rounded-lg font-medium transition text-xs md:text-sm whitespace-nowrap flex items-center gap-1.5">
                <svg class="w-4 h-4 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                성도 현황
            </a>
            <!-- 출석 현황 -->
            <a href="/dashboard.html" class="bg-white/10 hover:bg-white/20 text-white border border-white/20 px-3 py-1.5 rounded-lg font-medium transition text-xs md:text-sm whitespace-nowrap flex items-center gap-1.5">
                <svg class="w-4 h-4 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path></svg>
                출석 현황
            </a>
            <!-- 심방 현황 (Active) -->
            <a href="/visitation_history.html" class="bg-white text-blue-700 border border-white px-3 py-1.5 rounded-lg font-bold shadow-sm text-xs md:text-sm whitespace-nowrap flex items-center gap-1.5">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                심방 현황
            </a>
            <!-- 설교 현황 -->
            <a href="/sermon_history.html" class="bg-white/10 hover:bg-white/20 text-white border border-white/20 px-3 py-1.5 rounded-lg font-medium transition text-xs md:text-sm whitespace-nowrap flex items-center gap-1.5">
                <svg class="w-4 h-4 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                설교 현황
            </a>
        </div>
    </header>

    <!-- Nav (Legacy title kept for visual but simplified) -->
    <nav class="bg-white border-b shadow-sm sticky top-[60px] z-40">
        <div class="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <h2 class="text-xl font-black text-gray-800">심방 현황 관리</h2>
            </div>
            <div class="flex items-center gap-2">
                <span id="visitationCount" class="text-xs font-bold bg-blue-100 text-blue-600 px-3 py-1 rounded-full">로딩 중...</span>
            </div>
        </div>
    </nav>
    <main class="max-w-5xl mx-auto px-4 py-6">
        <!-- Filters -->
        <div class="bg-white p-4 rounded-xl shadow-sm mb-6 flex flex-wrap gap-4 items-center">
            <div class="flex-1 min-w-[200px]">
                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1 ml-1">구역 선택</label>
                <select id="districtFilter" class="w-full border-gray-200 rounded-lg text-sm focus:ring-blue-500 focus:border-blue-500">
                    <option value="전체">전체 구역</option>
                    <option value="581">581구역</option>
                    <option value="582">582구역</option>
                    <option value="583">583구역</option>
                </select>
            </div>
            <div class="flex-1 min-w-[200px]">
                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1 ml-1">정렬</label>
                <select id="sortOption" class="w-full border-gray-200 rounded-lg text-sm focus:ring-blue-500 focus:border-blue-500">
                    <option value="oldest" selected>오래된 심방순 (관리 필요 우선)</option>
                    <option value="name">이름순 (가나다)</option>
                    <option value="last_visitation">최근 심방순 (가장 최근부터)</option>
                    <option value="visited_first">기록 있는 분 먼저</option>
                    <option value="not_visited_first">기록 없는 분 먼저</option>
                    <option value="count">심방 횟수순</option>
                </select>
            </div>
        </div>

        <!-- List Container -->
        <div id="visitationList" class="space-y-4">
            <!-- Content will be injected by JS -->
            <div class="flex justify-center py-20">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600"></div>
            </div>
        </div>
    </main>

    <!-- Member History Modal (Copied from index.html / member_management.html, adjusted for read-only) -->
    <div id="memberHistoryModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center z-[100] p-2 md:p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl overflow-hidden flex flex-col max-h-[95vh] border border-slate-100">
            <div class="bg-gradient-to-r from-slate-800 to-slate-900 text-white p-5 flex justify-between items-center shadow-md">
                <h3 class="text-lg font-black tracking-tight">성도 상세 정보</h3>
                <button id="closeHistoryModal" class="text-slate-400 hover:text-white transition-colors duration-150">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="p-5 md:p-6 overflow-y-auto flex-1 bg-slate-50/50 no-scrollbar">
                <!-- 프로필 헤로 영역 -->
                <div id="memberBasicInfo" class="mb-6 grid grid-cols-2 md:grid-cols-4 gap-4 bg-white p-5 rounded-2xl shadow-sm border border-slate-200"></div>
                
                <!-- HRM 탭 바 -->
                <div class="flex border-b border-slate-200 mb-6 gap-2">
                    <button type="button" class="member-tab-btn active px-4 py-2 text-sm font-bold border-b-2 border-blue-600 text-blue-600 outline-none" data-tab="attendance">출석 히스토리</button>
                    <button type="button" class="member-tab-btn px-4 py-2 text-sm font-bold text-slate-500 border-b-2 border-transparent hover:text-slate-700 outline-none" data-tab="visitation">심방 메모</button>
                    <button type="button" class="member-tab-btn px-4 py-2 text-sm font-bold text-slate-500 border-b-2 border-transparent hover:text-slate-700 outline-none" data-tab="records">인적사항 기록</button>
                </div>

                <!-- 탭 콘텐츠 영역 -->
                <div id="tabContent_attendance" class="member-tab-content">
                    <div class="mb-6">
                        <h4 class="font-extrabold mb-3 text-slate-850 border-l-4 border-emerald-600 pl-2.5 flex justify-between items-center text-sm">
                            <span>출석 히스토리</span>
                            <div class="flex items-center gap-2">
                                <span class="text-xs font-bold text-slate-500">참석률</span>
                                <span id="memberAttendanceStats" class="font-black text-blue-655"></span>
                            </div>
                        </h4>
                        <div class="overflow-x-auto rounded-2xl border border-slate-200 bg-white shadow-sm">
                            <table class="w-full text-sm text-left border-collapse bg-white">
                                <thead class="bg-slate-50 text-slate-650 text-[11px] uppercase tracking-wider font-black border-b border-slate-200">
                                    <tr>
                                        <th class="p-3 w-[100px] cursor-pointer hover:bg-slate-100 transition sort-header border-r" data-sort="date">날짜 <span class="sort-icon"></span></th>
                                        <th class="p-3 min-w-[140px] cursor-pointer hover:bg-slate-100 transition sort-header border-r" data-sort="title">모임정보 <span class="sort-icon"></span></th>
                                        <th class="p-3 text-center w-[60px] cursor-pointer hover:bg-slate-100 transition sort-header border-r" data-sort="isPresent">출석 <span class="sort-icon"></span></th>
                                        <th class="p-3 cursor-pointer hover:bg-slate-100 transition sort-header" data-sort="memo">간증 <span class="sort-icon"></span></th>
                                    </tr>
                                </thead>
                                <tbody id="historyTableBody" class="divide-y divide-slate-100"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div id="tabContent_visitation" class="member-tab-content hidden">
                    <div id="visitationHistorySection" class="mb-6">
                        <h4 class="font-extrabold mb-3 text-teal-700 border-l-4 border-teal-500 pl-2.5 text-sm">심방 메모 기록</h4>
                        <div id="visitationMemoList" class="space-y-3">
                            <p class="text-slate-400 italic text-xs text-center py-8 bg-white rounded-2xl border border-dashed border-slate-200">기록이 없습니다.</p>
                        </div>
                    </div>
                </div>

                <div id="tabContent_records" class="member-tab-content hidden">
                    <div class="mb-4">
                        <h4 class="font-extrabold mb-3 text-slate-850 border-l-4 border-blue-600 pl-2.5 text-sm">인적사항 기록</h4>
                        <div id="timelineContainer" class="p-5 bg-white rounded-2xl border border-slate-200 shadow-sm hidden mb-4">
                            <!-- JS dynamic vertical timeline -->
                        </div>
                        <div id="tableRecordContainer" class="max-h-[300px] overflow-y-auto rounded-2xl border border-slate-200 bg-white shadow-sm no-scrollbar">
                            <table class="w-full text-left border-collapse">
                                <thead class="bg-slate-50 text-slate-655 text-[11px] uppercase tracking-wider font-black sticky top-0 border-b border-slate-200">
                                    <tr>
                                        <th class="p-3 w-[100px]">날짜</th>
                                        <th class="p-3 w-[150px]">상황</th>
                                        <th class="p-2 border-b">비고</th>
                                    </tr>
                                </thead>
                                <tbody id="recordTableBody" class="divide-y divide-slate-100"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-slate-50 p-4 border-t border-slate-100 flex justify-end gap-3">
                <button id="closeHistoryModalBtn" class="px-8 py-3 text-white bg-slate-800 hover:bg-slate-900 active:scale-[0.98] transition-all rounded-xl font-bold shadow-md text-sm">닫기</button>
            </div>
        </div>
    </div>

    <script src="/js/visitation_history.js"></script>
</body>
</html>
