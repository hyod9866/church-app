    <script>
        tailwind.config = {
            darkMode: 'class'
        }
        // Prevent flickering
        (function() {
            const theme = localStorage.getItem('theme') || 'system';
            const darkQuery = window.matchMedia('(prefers-color-scheme: dark)');
            if (theme === 'dark' || (theme === 'system' && darkQuery.matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        })();
    </script>

                <h3 class="text-lg font-black tracking-tight">성도 상세 정보</h3>
                <button id="closeHistoryModal" class="text-slate-400 hover:text-white transition-colors duration-150">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="p-5 md:p-6 overflow-y-auto flex-1 bg-slate-50/50 no-scrollbar">
                <!-- 프로필 헤로 영역 -->
                <div id="memberBasicInfo" class="mb-6 grid grid-cols-2 md:grid-cols-4 gap-4 bg-white p-5 rounded-2xl shadow-sm border border-slate-200"></div>
                
                <!-- HRM 탭 바 -->
                <div class="flex border-b border-slate-200 mb-6 gap-2">
                    <button type="button" class="member-tab-btn active px-4 py-2 text-sm font-bold border-b-2 border-blue-600 text-blue-600 outline-none" data-tab="attendance">출석 히스토리</button>
                    <button type="button" class="member-tab-btn px-4 py-2 text-sm font-bold text-slate-500 border-b-2 border-transparent hover:text-slate-700 outline-none" data-tab="visitation">심방 메모</button>
                    <button type="button" class="member-tab-btn px-4 py-2 text-sm font-bold text-slate-500 border-b-2 border-transparent hover:text-slate-700 outline-none" data-tab="records">인적사항 기록</button>
                </div>

                <!-- 탭 콘텐츠 영역 -->
                <div id="tabContent_attendance" class="member-tab-content">
                    <div class="mb-6">
                        <h4 class="font-extrabold mb-3 text-slate-850 border-l-4 border-emerald-600 pl-2.5 flex justify-between items-center text-sm">
                            <span>출석 히스토리</span>
                            <div class="flex items-center gap-2">
                                <span class="text-xs font-bold text-slate-500">참석률</span>
                                <span id="memberAttendanceStats" class="font-black text-blue-655"></span>
                            </div>
                        </h4>
                        <div class="overflow-x-auto rounded-2xl border border-slate-200 bg-white shadow-sm">
                            <table class="w-full text-sm text-left border-collapse bg-white">
                                <thead class="bg-slate-50 text-slate-650 text-[11px] uppercase tracking-wider font-black border-b border-slate-200">
                                    <tr>
                                        <th class="p-3 w-[100px] cursor-pointer hover:bg-slate-100 transition sort-header border-r" data-sort="date">날짜 <span class="sort-icon"></span></th>
                                        <th class="p-3 min-w-[140px] cursor-pointer hover:bg-slate-100 transition sort-header border-r" data-sort="title">모임정보 <span class="sort-icon"></span></th>
                                        <th class="p-3 text-center w-[60px] cursor-pointer hover:bg-slate-100 transition sort-header border-r" data-sort="isPresent">출석 <span class="sort-icon"></span></th>
                                        <th class="p-3 cursor-pointer hover:bg-slate-100 transition sort-header" data-sort="memo">간증 <span class="sort-icon"></span></th>
                                    </tr>
                                </thead>
                                <tbody id="historyTableBody" class="divide-y divide-slate-100"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div id="tabContent_visitation" class="member-tab-content hidden">
                    <div id="visitationHistorySection" class="mb-6">
                        <h4 class="font-extrabold mb-3 text-teal-700 border-l-4 border-teal-500 pl-2.5 text-sm">심방 메모 기록</h4>
                        <div id="visitationMemoList" class="space-y-3">
                            <p class="text-slate-400 italic text-xs text-center py-8 bg-white rounded-2xl border border-dashed border-slate-200">기록이 없습니다.</p>
                        </div>
                    </div>
                </div>

                <div id="tabContent_records" class="member-tab-content hidden">
                    <div class="mb-4">
                        <h4 class="font-extrabold mb-3 text-slate-850 border-l-4 border-blue-600 pl-2.5 text-sm">인적사항 기록</h4>
                        <div id="timelineContainer" class="p-5 bg-white rounded-2xl border border-slate-200 shadow-sm hidden mb-4">
                            <!-- JS dynamic vertical timeline -->
                        </div>
                        <div id="tableRecordContainer" class="max-h-[300px] overflow-y-auto rounded-2xl border border-slate-200 bg-white shadow-sm no-scrollbar">
                            <table class="w-full text-left border-collapse">
                                <thead class="bg-slate-50 text-slate-655 text-[11px] uppercase tracking-wider font-black sticky top-0 border-b border-slate-200">
                                    <tr>
                                        <th class="p-3 w-[100px]">날짜</th>
                                        <th class="p-3 w-[150px]">상황</th>
                                        <th class="p-2 border-b">비고</th>
                                    </tr>
                                </thead>
                                <tbody id="recordTableBody" class="divide-y divide-slate-100"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-slate-50 p-4 border-t border-slate-100 flex justify-end gap-3">
                <button id="closeHistoryModalBtn" class="px-8 py-3 text-white bg-slate-800 hover:bg-slate-900 active:scale-[0.98] transition-all rounded-xl font-bold shadow-md text-sm">닫기</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal (Dynamic Theme Settings) -->
    <div id="settingsModal" class="fixed inset-0 z-[300] flex items-center justify-center hidden">
        <!-- Backdrop -->
        <div id="settingsModalBackdrop" class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
        <!-- Modal Content -->
        <div class="bg-white dark:bg-[#131B2E] w-[90%] max-w-sm rounded-3xl border border-slate-100 dark:border-slate-800/80 shadow-2xl relative z-10 overflow-hidden transform scale-95 opacity-0 transition-all duration-200 flex flex-col">
            <div class="p-5 border-b border-slate-100 dark:border-slate-800/60 flex justify-between items-center">
                <h3 class="font-black text-slate-800 dark:text-slate-100 text-sm flex items-center gap-2">
                    <svg class="w-4 h-4 text-blue-600 dark:text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    애플리케이션 설정
                </h3>
                <button id="closeSettingsModal" class="text-slate-400 hover:text-slate-650 dark:hover:text-slate-200 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="text-[10px] font-black text-slate-400 dark:text-slate-550 uppercase tracking-wider block mb-2">테마 스타일</label>
                    <div class="grid grid-cols-3 gap-2">
                        <button type="button" id="themeLightBtn" class="flex flex-col items-center justify-center p-3 rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 hover:bg-slate-100 dark:bg-[#0B0F19] dark:hover:bg-[#1E293B]/30 text-xs font-bold text-slate-700 dark:text-slate-300 transition duration-150 cursor-pointer">
                            <span class="text-lg mb-1">☀️</span>
                            라이트
                        </button>
                        <button type="button" id="themeDarkBtn" class="flex flex-col items-center justify-center p-3 rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 hover:bg-slate-100 dark:bg-[#0B0F19] dark:hover:bg-[#1E293B]/30 text-xs font-bold text-slate-700 dark:text-slate-300 transition duration-150 cursor-pointer">
                            <span class="text-lg mb-1">🌙</span>
                            다크
                        </button>
                        <button type="button" id="themeSystemBtn" class="flex flex-col items-center justify-center p-3 rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 hover:bg-slate-100 dark:bg-[#0B0F19] dark:hover:bg-[#1E293B]/30 text-xs font-bold text-slate-700 dark:text-slate-300 transition duration-150 cursor-pointer">
                            <span class="text-lg mb-1">💻</span>
                            시스템
                        </button>
                    </div>
                </div>
            </div>
            <div class="p-4 bg-slate-50 dark:bg-[#172237]/50 border-t border-slate-100 dark:border-slate-800/60 text-center">
                <p class="text-[10px] font-bold text-slate-400 dark:text-slate-550">Pastoral Ministry Program v1.2.0</p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/theme.js?v=final-theme-fix-10"></script>
    <script src="/js/visitation_history.js"></script>
</body>
</html>
