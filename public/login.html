<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <script>
        document.documentElement.classList.add('dark');
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - Pastoral Ministry Program</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <!-- FontAwesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/dark-theme-fixes.css?v=1">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
        body {
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900 min-h-screen flex items-center justify-center p-4">
    <!-- Settings Gear Button -->
    <button id="openSettingsBtn" class="fixed top-4 right-4 bg-white/15 hover:bg-white/25 text-white border border-white/15 p-3 rounded-2xl transition-all duration-300 hover:rotate-90 shadow-lg shadow-black/20 backdrop-blur-md cursor-pointer z-50 flex items-center justify-center" title="설정">
        <svg class="w-5.5 h-5.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
    </button>
    <div class="w-full max-w-md bg-white/10 backdrop-blur-xl border border-white/10 p-8 rounded-3xl shadow-2xl flex flex-col gap-6 text-white transition-all duration-300">
        <!-- Logo/Header -->
        <div class="text-center flex flex-col gap-2">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto shadow-lg shadow-blue-500/20">
                <i class="fa-solid fa-church text-2xl text-white"></i>
            </div>
            <h1 class="text-2xl font-black tracking-wide mt-3">Pastoral Ministry Program</h1>
            <p class="text-xs text-slate-400 font-semibold">목회 관리 프로그램 로그인</p>
        </div>

        <!-- Form -->
        <form id="loginForm" class="flex flex-col gap-4">
            <div class="flex flex-col gap-1.5">
                <label for="email" class="text-xs font-bold text-slate-300 ml-1">이메일 주소</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
                        <i class="fa-solid fa-envelope text-sm"></i>
                    </span>
                    <input type="email" id="email" required placeholder="admin@church.com" class="block w-full pl-10 pr-3 py-3 border border-white/10 rounded-xl bg-white/5 placeholder-slate-500 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 text-white font-bold transition shadow-sm">
                </div>
            </div>

            <div class="flex flex-col gap-1.5">
                <label for="password" class="text-xs font-bold text-slate-300 ml-1">비밀번호</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
                        <i class="fa-solid fa-lock text-sm"></i>
                    </span>
                    <input type="password" id="password" required placeholder="••••••••" class="block w-full pl-10 pr-10 py-3 border border-white/10 rounded-xl bg-white/5 placeholder-slate-500 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 text-white font-bold transition shadow-sm">
                    <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-white transition">
                        <i class="fa-solid fa-eye text-sm" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <div class="flex items-center justify-between px-1">
                <label class="flex items-center gap-2 text-xs font-semibold text-slate-300 cursor-pointer select-none">
                    <input type="checkbox" id="rememberMe" class="w-4 h-4 rounded border-white/10 bg-white/5 text-blue-600 focus:ring-blue-500/50 focus:ring-offset-slate-900 focus:ring-2 accent-blue-600 transition">
                    <span>이메일 저장</span>
                </label>
            </div>

            <div id="errorMessage" class="text-rose-400 text-xs font-bold ml-1 hidden">
                <!-- Error msg placeholder -->
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white py-3.5 rounded-xl font-black text-sm shadow-lg shadow-blue-500/10 active:scale-[0.98] transition duration-200 mt-2">
                로그인
            </button>
        </form>

        <!-- Divider -->
        <div class="flex items-center gap-3 my-1">
            <div class="flex-1 h-px bg-white/10"></div>
            <span class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">또는</span>
            <div class="flex-1 h-px bg-white/10"></div>
        </div>

        <!-- Biometric Login Button (Passkey) -->
        <button type="button" id="passkeyBtn" class="w-full bg-white/5 hover:bg-white/10 text-white border border-white/10 py-3 rounded-xl font-bold text-xs flex items-center justify-center gap-2 transition active:scale-[0.98]">
            <i class="fa-solid fa-face-id text-blue-400 text-sm"></i>
            <span>Face ID / 생체인식 로그인</span>
        </button>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const rememberMeInput = document.getElementById('rememberMe');
        const errorMessage = document.getElementById('errorMessage');
        const togglePassword = document.getElementById('togglePassword');
        const eyeIcon = document.getElementById('eyeIcon');
        const passkeyBtn = document.getElementById('passkeyBtn');

        // Load saved email if exists
        const savedEmail = localStorage.getItem('savedEmail');
        if (savedEmail) {
            emailInput.value = savedEmail;
            rememberMeInput.checked = true;
        }

        // Toggle password visibility
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            if (type === 'text') {
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        });

        // Form submit handler
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.classList.add('hidden');

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Save or remove email in localStorage
                    if (rememberMeInput.checked) {
                        localStorage.setItem('savedEmail', email);
                    } else {
                        localStorage.removeItem('savedEmail');
                    }
                    
                    // Register biometric login if supported and not enabled
                    if (window.PublicKeyCredential && localStorage.getItem('biometric_enabled') !== 'true') {
                        await registerBiometric(email);
                    }
                    
                    // Redirect to dashboard or home page
                    location.href = '/';
                } else {
                    errorMessage.textContent = data.error || '로그인에 실패했습니다.';
                    errorMessage.classList.remove('hidden');
                }
            } catch (err) {
                errorMessage.textContent = '서버 연결에 실패했습니다. 다시 시도해 주세요.';
                errorMessage.classList.remove('hidden');
            }
        });

        // Biometric (Face ID / Passkey) functions
        async function registerBiometric(email) {
            if (!confirm("다음 로그인부터 Face ID / 생체인식 로그인을 사용하시겠습니까?")) {
                return;
            }

            try {
                const challenge = new Uint8Array(32);
                window.crypto.getRandomValues(challenge);
                
                const userID = new Uint8Array(16);
                window.crypto.getRandomValues(userID);

                const publicKeyCredentialCreationOptions = {
                    challenge: challenge,
                    rp: {
                        name: "Church App",
                        id: window.location.hostname
                    },
                    user: {
                        id: userID,
                        name: email,
                        displayName: email
                    },
                    pubKeyCredParams: [{
                        type: "public-key",
                        alg: -7 // ES256
                    }],
                    authenticatorSelection: {
                        authenticatorAttachment: "platform",
                        userVerification: "required"
                    },
                    timeout: 60000
                };

                const credential = await navigator.credentials.create({
                    publicKey: publicKeyCredentialCreationOptions
                });

                if (credential) {
                    // 백엔드에서 보안 서명 토큰 발급 요청
                    const response = await fetch('/api/register-biometric', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email })
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok && data.success && data.token) {
                        localStorage.setItem('biometric_enabled', 'true');
                        localStorage.setItem('biometric_email', email);
                        localStorage.setItem('biometric_token', data.token);
                        // 레거시 평문 비밀번호 키 삭제
                        localStorage.removeItem('biometric_cred');
                        alert("Face ID / 생체인식 등록이 완료되었습니다. 다음 로그인부터 사용하실 수 있습니다.");
                    } else {
                        throw new Error(data.error || "서버 토큰 등록 실패");
                    }
                }
            } catch (err) {
                console.error("생체인식 등록 실패:", err);
                alert("생체인식 등록에 실패했거나 취소되었습니다.");
            }
        }

        async function loginWithBiometric() {
            if (!window.PublicKeyCredential) {
                alert("이 브라우저 또는 기기는 생체인식을 지원하지 않습니다.");
                return;
            }

            const biometricEnabled = localStorage.getItem('biometric_enabled');
            const savedEmail = localStorage.getItem('biometric_email');
            const savedToken = localStorage.getItem('biometric_token');
            const savedCred = localStorage.getItem('biometric_cred');

            if (biometricEnabled !== 'true' || !savedEmail || (!savedToken && !savedCred)) {
                alert("등록된 생체인식 정보가 없습니다. 먼저 이메일과 비밀번호로 로그인하여 생체인식을 등록해 주세요.");
                return;
            }

            try {
                const challenge = new Uint8Array(32);
                window.crypto.getRandomValues(challenge);

                const publicKeyCredentialRequestOptions = {
                    challenge: challenge,
                    rpId: window.location.hostname,
                    userVerification: "required",
                    timeout: 60000
                };

                const assertion = await navigator.credentials.get({
                    publicKey: publicKeyCredentialRequestOptions
                });

                if (assertion) {
                    errorMessage.classList.add('hidden');
                    
                    if (savedToken) {
                        // 보안 서명 토큰 기반 로그인 수행
                        const response = await fetch('/api/login-biometric', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email: savedEmail, token: savedToken })
                        });
                        
                        const data = await response.json();
                        if (response.ok && data.success) {
                            location.href = '/';
                        } else {
                            errorMessage.textContent = data.error || '생체인식 로그인 실패: 토큰이 유효하지 않습니다.';
                            errorMessage.classList.remove('hidden');
                        }
                    } else if (savedCred) {
                        // 레거시 평문 암호 로그인 수행 (하위 호환성 유지 후 자동 마이그레이션)
                        const password = atob(savedCred);
                        const response = await fetch('/api/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email: savedEmail, password })
                        });

                        const data = await response.json();
                        if (response.ok && data.success) {
                            // 로그인 성공 후 새로운 보안 서명 토큰으로 자동 재등록 시도
                            try {
                                const regRes = await fetch('/api/register-biometric', {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ email: savedEmail })
                                });
                                const regData = await regRes.json();
                                if (regRes.ok && regData.success && regData.token) {
                                    localStorage.setItem('biometric_token', regData.token);
                                    localStorage.removeItem('biometric_cred');
                                }
                            } catch (e) {
                                console.error("레거시 생체인식 마이그레이션 오류:", e);
                            }
                            location.href = '/';
                        } else {
                            errorMessage.textContent = data.error || '생체인식 로그인 실패: 비밀번호 정보를 확인해 주세요.';
                            errorMessage.classList.remove('hidden');
                        }
                    }
                }
            } catch (err) {
                console.error("생체인식 인증 실패:", err);
                if (err.name !== 'NotAllowedError') {
                    alert("생체인식 로그인 중 오류가 발생했습니다.");
                }
            }
        }

        // Passkey button click handler
        passkeyBtn.addEventListener('click', loginWithBiometric);
    </script>

    <!-- Settings Modal (Dynamic Theme Settings) -->
    <div id="settingsModal" class="fixed inset-0 z-[300] flex items-center justify-center hidden">
        <!-- Backdrop -->
        <div id="settingsModalBackdrop" class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
        <!-- Modal Content -->
        <div class="bg-white dark:bg-[#131B2E] w-[90%] max-w-sm rounded-3xl border border-slate-100 dark:border-slate-800/80 shadow-2xl relative z-10 overflow-hidden transform scale-95 opacity-0 transition-all duration-200 flex flex-col">
            <div class="p-5 border-b border-slate-100 dark:border-slate-800/60 flex justify-between items-center">
                <h3 class="font-black text-slate-800 dark:text-slate-100 text-sm flex items-center gap-2">
                    <svg class="w-4 h-4 text-blue-600 dark:text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    애플리케이션 설정
                </h3>
                <button id="closeSettingsModal" class="text-slate-400 hover:text-slate-650 dark:hover:text-slate-200 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="text-[10px] font-black text-slate-400 dark:text-slate-555 uppercase tracking-wider block mb-2">테마 스타일</label>
                    <div class="grid grid-cols-3 gap-2">
                        <button type="button" id="themeLightBtn" class="flex flex-col items-center justify-center p-3 rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 hover:bg-slate-100 dark:bg-[#0B0F19] dark:hover:bg-[#1E293B]/30 text-xs font-bold text-slate-700 dark:text-slate-300 transition duration-150 cursor-pointer">
                            <span class="text-lg mb-1">☀️</span>
                            라이트
                        </button>
                        <button type="button" id="themeDarkBtn" class="flex flex-col items-center justify-center p-3 rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 hover:bg-slate-100 dark:bg-[#0B0F19] dark:hover:bg-[#1E293B]/30 text-xs font-bold text-slate-700 dark:text-slate-300 transition duration-150 cursor-pointer">
                            <span class="text-lg mb-1">🌙</span>
                            다크
                        </button>
                        <button type="button" id="themeSystemBtn" class="flex flex-col items-center justify-center p-3 rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 hover:bg-slate-100 dark:bg-[#0B0F19] dark:hover:bg-[#1E293B]/30 text-xs font-bold text-slate-700 dark:text-slate-300 transition duration-150 cursor-pointer">
                            <span class="text-lg mb-1">💻</span>
                            시스템
                        </button>
                    </div>
                </div>
            </div>
            <div class="p-4 bg-slate-50 dark:bg-[#172237]/50 border-t border-slate-100 dark:border-slate-800/60 text-center">
                <p class="text-[10px] font-bold text-slate-400 dark:text-slate-555">Pastoral Ministry Program v1.2.0</p>
            </div>
        </div>
    </div>

    <script src="/js/theme.js?v=final-theme-fix-10"></script>
</body>
</html>
